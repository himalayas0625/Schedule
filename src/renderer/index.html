<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>日程</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/grid.css">
  <link rel="stylesheet" href="styles/notes.css">
</head>
<body>
  <!-- Layer 1：系统标题栏（32px，仅窗口控件） -->
  <div id="system-bar">
    <div id="window-controls">
      <button id="btn-minimize" title="最小化">&#8211;</button>
      <button id="btn-maximize" title="最大化">&#9633;</button>
      <button id="btn-close" title="关闭到托盘">&#215;</button>
    </div>
  </div>

  <!-- Layer 2：应用导航栏（44px，标题 + 周导航居中） -->
  <div id="toolbar">
    <div id="title-center">
      <span id="app-title">日程</span>
      <div id="week-nav">
        <button id="btn-prev-week" title="上一周">&#8249;</button>
        <button id="btn-week-label" title="回到本周">本周</button>
        <button id="btn-next-week" title="下一周">&#8250;</button>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div id="app-container">
    <!-- 左侧笔记面板 -->
    <aside id="notes-panel">
      <div id="notes-loading">加载中...</div>
    </aside>

    <!-- 侧边栏拖拽手柄 -->
    <div id="sidebar-resizer"></div>

    <!-- 日程网格 -->
    <main id="schedule-grid">
      <!-- 日视图：顶部信息胶囊（非对称三模块） -->
      <div id="day-header-pill">
        <!-- 左模块：日期圆圈 + 星期（上）+ 公历·阴历（下） -->
        <div class="left-info">
          <div class="dhp-date-circle"><span class="dhp-day-num">1</span></div>
          <div class="left-stack">
            <div class="dhp-primary">
              <span class="dhp-weekday-cn">周一</span>
              <span class="dhp-weekday-en">Monday</span>
            </div>
            <div class="dhp-date-lunar"></div>
          </div>
        </div>
        <!-- 中模块：名言警句居中，窄屏自动隐藏 -->
        <div class="center-motto">
          <span class="dhp-secondary"></span>
        </div>
        <!-- 右模块：天气（上）+ 沙漏倒计时（下），镜像堆栈对齐 -->
        <div class="right-stack">
          <span class="dhp-weather">
            <span class="weather-city"></span>
            <span class="weather-icon"></span>
            <span class="weather-temp"></span>
          </span>
        </div>
      </div>
      <!-- 表头：星期列 -->
      <div id="grid-header"></div>
      <!-- 可滚动网格体 -->
      <div id="grid-body"></div>
      <!-- 底部悬浮胶囊：日/周视图切换 -->
      <div id="view-switcher">
        <button class="pill-btn" data-view="day">日</button>
        <button class="pill-btn active" data-view="week">周</button>
        <button class="pill-btn" data-view="month">月</button>
      </div>
    </main>

    <!-- 右侧边栏拖拽手柄 -->
    <div id="right-resizer"></div>

    <!-- 右侧"今日重点"面板 -->
    <aside id="right-panel">
      <div id="right-panel-loading">加载中...</div>
    </aside>
  </div>

  <!-- 浮动编辑框（全局唯一） -->
  <div id="floating-editor" style="display:none">
    <textarea id="floating-textarea" rows="3" placeholder="输入事件内容..."></textarea>
  </div>

  <!-- 右下角缩放手柄 -->
  <div id="resize-handle" title="拖拽调整窗口大小"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
